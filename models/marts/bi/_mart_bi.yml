version: 2

models:

  - name: dim_estacion
    description: >
      Catálogo de estaciones activas 2022-2024, derivado de stg_recorridos.
      Cubre tanto estaciones de origen como de destino. Sin barrio/comuna
      (ver decisions.md [2026-05-16]).
    columns:
      - name: id
        description: ID de la estación (SMALLINT). PK.
        tests:
          - not_null
          - unique
      - name: nombre
        description: Nombre de la estación. Se toma el valor más reciente vía MAX.
        tests:
          - not_null

  - name: dim_fecha
    description: >
      Dimensión fecha con granularidad de día. Generada desde las fechas
      de inicio de viaje presentes en stg_recorridos. id = YYYYMMDD entero
      (ej. 20220101).
    columns:
      - name: id
        description: Clave de fecha en formato YYYYMMDD (INTEGER). PK.
        tests:
          - not_null
          - unique
      - name: dia
        description: Día del mes (1-31).
        tests:
          - not_null
      - name: mes
        description: Mes del año (1-12).
        tests:
          - not_null
      - name: semana
        description: Semana ISO del año (1-53).
        tests:
          - not_null
      - name: anio
        description: Año (2022, 2023 o 2024).
        tests:
          - not_null
          - accepted_values:
              values: [2022, 2023, 2024]
      - name: fecha_completa
        description: Fecha como tipo DATE. Útil para filtros en herramientas BI.
        tests:
          - not_null

  - name: dim_demografia
    description: >
      Segmentos demográficos únicos: combinaciones de (genero, rango_etario)
      presentes en el padrón de usuarios. Incluye una fila con genero=NULL y
      rango_etario='Desconocido' para agrupar al ~30% de usuarios sin padrón
      disponible (altas previas a 2022). Reemplaza dim_usuario.
    columns:
      - name: id
        description: Surrogate key (BIGINT). PK.
        tests:
          - not_null
          - unique
      - name: genero
        description: Género autodeclarado (MALE, FEMALE, OTHER, NULL para huérfanos).
        tests:
          - accepted_values:
              values: ['MALE', 'FEMALE', 'OTHER']
              config:
                where: "genero is not null"
      - name: rango_etario
        description: >
          Rango etario derivado de edad. Categorías: 16-25, 26-35, 36-50,
          51-65, 66+, Desconocido (edad nula o usuario sin padrón).
        tests:
          - not_null
          - accepted_values:
              values: ['16-25', '26-35', '36-50', '51-65', '66+', 'Desconocido']

  - name: dim_recorrido
    description: >
      Dimensión de rutas únicas: pares (estación_origen, estación_destino)
      observados en stg_recorridos. La columna ruta concatena los nombres
      de ambas estaciones como "Origen → Destino". Las columnas
      id_estacion_origen e id_estacion_destino sirven de clave de join
      desde fct_viajes (no están en el diagrama conceptual pero son
      necesarias internamente).
    columns:
      - name: id
        description: Surrogate key (BIGINT). PK.
        tests:
          - not_null
          - unique
      - name: id_estacion_origen
        description: FK → dim_estacion.id.
        tests:
          - not_null
          - relationships:
              to: ref('dim_estacion')
              field: id
      - name: id_estacion_destino
        description: FK → dim_estacion.id.
        tests:
          - not_null
          - relationships:
              to: ref('dim_estacion')
              field: id
      - name: ruta
        description: Cadena "nombre_origen → nombre_destino". VARCHAR(200).
        tests:
          - not_null

  - name: fct_viajes
    description: >
      Tabla de hechos principal. Grano: 1 fila por combinación de
      (segmento demográfico, ruta, día). Medidas: cantidad de viajes y
      duración promedio en minutos. Excluye viajes sin cierre (duracion_seg=0).
      ~30% de viajes quedan en el segmento demografía NULL/Desconocido por
      la FK floja recorridos→usuarios (ver decisions.md [2026-05-17]).
    columns:
      - name: id
        description: Surrogate key (BIGINT). PK.
        tests:
          - not_null
          - unique
      - name: id_fecha
        description: FK → dim_fecha.id (formato YYYYMMDD).
        tests:
          - not_null
          - relationships:
              to: ref('dim_fecha')
              field: id
      - name: id_demografia
        description: FK → dim_demografia.id.
        tests:
          - not_null
          - relationships:
              to: ref('dim_demografia')
              field: id
      - name: id_recorrido
        description: FK → dim_recorrido.id.
        tests:
          - not_null
          - relationships:
              to: ref('dim_recorrido')
              field: id
      - name: cantidad
        description: Cantidad de viajes en la combinación (demografia, ruta, día).
        tests:
          - not_null
      - name: minutos
        description: Duración promedio de los viajes en minutos (truncado a entero).
        tests:
          - not_null

  - name: fact_actividad
    description: >
      Segunda tabla de hechos. Grano: 1 fila por (segmento demográfico,
      estación de salida, día). Cuenta viajes completados que partieron de
      cada estación. Útil para análisis de demanda por nodo y perfil.
    columns:
      - name: id
        description: Surrogate key (BIGINT). PK.
        tests:
          - not_null
          - unique
      - name: id_fecha
        description: FK → dim_fecha.id (formato YYYYMMDD).
        tests:
          - not_null
          - relationships:
              to: ref('dim_fecha')
              field: id
      - name: id_demografia
        description: FK → dim_demografia.id.
        tests:
          - not_null
          - relationships:
              to: ref('dim_demografia')
              field: id
      - name: id_estacion
        description: FK → dim_estacion.id. Estación de salida del viaje.
        tests:
          - not_null
          - relationships:
              to: ref('dim_estacion')
              field: id
      - name: cantidad
        description: Cantidad de viajes que partieron de esa estación en esa combinación.
        tests:
          - not_null
